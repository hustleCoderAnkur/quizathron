<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Start Quiz</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="style.css">

</head>
<body>

    <header>
        <button class="icon-btn">
            <img src="https://img.icons8.com/ios-filled/50/FFFFFF/quiz.png" alt="quiz" />
        </button>
        <h1>Quizathron</h1>
        <div class="header-spacer"></div>
    </header>

    <div class="card">

        <div class="icon-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
                stroke-linejoin="round">
                <path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2z" />
                <path d="M12 8v4l3 3" />
            </svg>
        </div>

        <div>
            <div class="card-title">Ready to Test<br>Your Knowledge?</div>
        </div>

        <p class="card-sub">20 questions across science &amp; technology.<br>Answer carefully — every point counts.</p>

        <div class="meta-row">
            <div class="meta-pill">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10" />
                    <polyline points="12 6 12 12 16 14" />
                </svg>
                10 Questions
            </div>
            <div class="meta-pill">
                <span class="dot"></span>
                Mixed Difficulty
            </div>
            <div class="meta-pill">
                <span class="dot green"></span>
                3 Lives
            </div>
        </div>

        <div class="divider"></div>

        <button class="start-btn">
            <a href="home.html" >Start Quiz</a>

            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
                stroke-linejoin="round">
                <path d="M9 18l6-6-6-6" />
            </svg>
        </button>

        <p class="note">Good luck — you've got this ✦</p>

    </div>
    <script src="script.js"></script>
</body>

</html>
